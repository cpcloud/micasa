name: Feature Request
description: Suggest a new feature or enhancement.
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: Problem or motivation
      description: What problem does this solve, or what workflow does it improve?
    validations:
      required: true
  - type: textarea
    id: solution
    attributes:
      label: Proposed solution
      description: How you'd like it to work. Keyboard shortcuts, UI sketches, or CLI examples are all helpful.
    validations:
      required: true
  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: Other approaches you thought about and why they're less ideal.
    validations:
      required: false
  - type: textarea
    id: extra
    attributes:
      label: Additional context
      description: Screenshots, terminal recordings, links to related issues, etc.
    validations:
      required: false
